services:
  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4-alpine
    container_name: lavalink
    restart: unless-stopped
    environment:
      - _JAVA_OPTIONS=-Xmx6G
      - SERVER_PORT=2333
      - LAVALINK_SERVER_PASSWORD=youshallnotpass
      - LAVALINK_SERVER_SOURCES_LOCAL=true
    volumes:
      - ./cache/:/opt/Lavalink/cache/
    ports:
      - "2333:2333"
    healthcheck:
        test: nc -z -v localhost 2333
        interval: 10s
        timeout: 5s
        retries: 5
